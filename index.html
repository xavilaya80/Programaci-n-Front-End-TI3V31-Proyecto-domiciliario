<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria - Proyecto Final</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor">
        <h1>Memoria Táctica</h1>
        <div class="controles">
            <input type="text" id="nombre-jugador" placeholder="Ingresa tu nombre..." autocomplete="off">
            <select id="dificultad">
                <option value="4">Fácil (4 pares)</option>
                <option value="8" selected>Normal (8 pares)</option>
            </select>
            <div class="caja-timer">
                <label><input type="checkbox" id="usar-timer"> Con Tiempo</label>
                <input type="number" id="segundos-timer" value="60" min="10" max="300" disabled>
                <span>segundos</span>
            </div>
            <button id="btn-iniciar">Iniciar (o tecla 'R')</button>
        </div>
        <div class="info-juego">
            <p id="contador-movimientos">Movimientos: 0</p>
            <p id="tiempo-restante" class="oculto">Tiempo: --</p>
        </div>
        <p id="mensaje-victoria"></p>
        <div id="tablero" class="tablero"></div>
        <div class="ranking-contenedor">
            <h3>🏆 Mejores Puntajes</h3>
            <ul id="lista-ranking"></ul>
        </div>
    </main>
    <audio id="sonido-victoria" src="victoria.mp3" preload="auto"></audio>
    <script src="app.js"></script>
</body>
</html>
